models:
  visionfm_oct:
    source_dir: ../Foundation_Models/VisionFM-main
    modalities: [oct]
    fairvision_tasks: [amd, dr, glaucoma]
    pretrained_weights_required:
      - pretrain_weights/VFM_OCT_weights.pth
    integration_route: image_embedding_linear_probe
    train_script: scripts/train_fairvision_visionfm.py
    run_script: scripts/run_fairvision_visionfm.sh
    status: adapter_scaffolded_needs_data_environment_and_weights

  visionfm_slo:
    source_dir: ../Foundation_Models/VisionFM-main
