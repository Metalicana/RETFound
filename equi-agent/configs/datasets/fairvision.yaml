name: harvard_fairvision
root: ../Datasets/FairVision
manifest_format: fairvision_summary_csv
metadata_root: ../Datasets/FairVision/HarvardFairVision30k
split_roots:
  train: ../Datasets/FairVision/Training
  val: ../Datasets/FairVision/Validation
  test: ../Datasets/FairVision/Test
tasks:
  - amd
  - dr
  - glaucoma
demographic_attributes:
  - race
  - ethnicity
  - sex_gender
  - age_group
intersectional_attributes:
  - race_x_sex_gender
  - race_x_age_group
  - sex_gender_x_age_group
split_policy:
  unit: patient_id
  keep_eyes_together: true
subgroup_reporting:
  min_positive: 20
  min_negative: 20
