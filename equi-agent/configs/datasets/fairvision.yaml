name: harvard_fairvision
root: ../Datasets/FairVision
manifest_format: fairvision_summary_csv
metadata_root: ../Datasets/FairVision/HarvardFairVision30k
split_roots:
  train: ../Datasets/FairVision/Training
  val: ../Datasets/FairVision/Validation
  test: ../Datasets/FairVision/Test
tasks:
  - amd
  - dr
  - glaucoma
demographic_attributes:
  - race
  - ethnicity
  - sex_gender
  - age_group
intersectional_attributes:
  - race_x_sex_gender
  - race_x_age_group
  - sex_gender_x_age_group
split_policy:
  unit: patient_id
  keep_eyes_together: true
subgroup_reporting:
  min_positive: 20
  min_negative: 20
reliability_selective_arbitration:
  subgroup_prior_source: validation_only
  subgroup_shrinkage_k: 50
  conformal_alpha: 0.10
  conformal_shrinkage_k: 50
  close_call_margin: 0.08
  disagreement_rate_threshold: 0.25
  low_reliability_threshold: 0.35
  reliability_score:
    auroc_weight: 0.45
    f1_weight: 0.35
    ece_penalty: 0.10
    fnr_penalty: 0.07
    fpr_penalty: 0.03
  attribute_priority:
    - race_x_sex_gender
    - race_x_age_group
    - sex_gender_x_age_group
    - race
    - ethnicity
    - sex_gender
    - age_group
  coverage_grid:
    - 1.00
    - 0.95
    - 0.90
    - 0.85
    - 0.80
    - 0.75
    - 0.70
    - 0.60
    - 0.50
